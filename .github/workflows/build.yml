name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:   # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: |
          pip install pyinstaller customtkinter win10toast pillow

      - name: Telecharger rclone.exe
        shell: powershell
        run: |
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone_tmp
          $rclone = Get-ChildItem -Path rclone_tmp -Recurse -Filter rclone.exe | Select-Object -First 1
          Copy-Item $rclone.FullName -Destination rclone.exe
          Remove-Item -Recurse rclone_tmp, rclone.zip

      - name: Ajouter rclone dans le spec
        shell: powershell
        run: |
          $spec = Get-Content megasync.spec -Raw
          $spec = $spec -replace "binaries=\[\]", "binaries=[('rclone.exe', '.')]"
          Set-Content megasync.spec $spec

      - name: Construire le .exe
        run: |
          pyinstaller megasync.spec

      - name: Creer le dossier de distribution
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist\MEGASync-Windows -Force
          Copy-Item dist\MEGASync.exe dist\MEGASync-Windows\MEGASync.exe
          # Creer un README pour l'utilisateur
          @"
          MEGA Sync - Installation Windows
          =================================

          1. Lancez MEGASync.exe
          2. Cliquez sur "Parametres" et entrez votre email/mot de passe MEGA
          3. Branchez votre disque dur
          4. Selectionnez les dossiers a synchroniser
          5. Cliquez DEMARRER

          Note : rclone est inclus dans l'executable, aucune installation supplementaire requise.
          "@ | Set-Content dist\MEGASync-Windows\LISEZMOI.txt
          Compress-Archive -Path dist\MEGASync-Windows\* -DestinationPath dist\MEGASync-Windows.zip

      # -------------------------------------------------------
      # TEST : lancer le .exe et verifier qu'il ne crashe pas
      # -------------------------------------------------------
      - name: Lancer le .exe et capturer l'ecran
        shell: powershell
        run: |
          Write-Host "Lancement de MEGASync.exe..."
          $proc = Start-Process -FilePath "dist\MEGASync-Windows\MEGASync.exe" `
                                -PassThru -WindowStyle Normal

          # Attendre que la fenetre se charge (10 secondes)
          Start-Sleep -Seconds 10

          # Verifier que le processus tourne encore
          if ($proc.HasExited) {
              Write-Error "ECHEC : L'application a crashe (code $($proc.ExitCode))"
              exit 1
          }
          Write-Host "SUCCES : L'application tourne (PID $($proc.Id))"

          # Capture d'ecran de la fenetre
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $screen  = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap  = New-Object System.Drawing.Bitmap($screen.Width, $screen.Height)
          $gfx     = [System.Drawing.Graphics]::FromImage($bitmap)
          $gfx.CopyFromScreen($screen.Location, [System.Drawing.Point]::Empty, $screen.Size)
          $bitmap.Save("screenshot_test.png")
          Write-Host "Capture d'ecran sauvegardee : screenshot_test.png"

          # Fermer proprement
          $proc.Kill()
          Write-Host "Application fermee."

      - name: Publier la capture d'ecran
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-test
          path: screenshot_test.png
          retention-days: 7

      - name: Publier en tant qu'artifact
        uses: actions/upload-artifact@v4
        with:
          name: MEGASync-Windows
          path: dist/MEGASync-Windows.zip
          retention-days: 30

      - name: Creer une Release GitHub
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: build-${{ github.run_number }}
          name: "MEGA Sync - Build ${{ github.run_number }}"
          body: |
            ## MEGA Sync pour Windows

            ### Installation
            1. Telechargez `MEGASync-Windows.zip`
            2. Extrayez le fichier
            3. Double-cliquez sur `MEGASync.exe`

            **rclone est inclus** - aucune installation supplementaire.
          files: dist/MEGASync-Windows.zip
          draft: false
          prerelease: false
